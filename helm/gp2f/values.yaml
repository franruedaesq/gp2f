# Default values for the gp2f Helm chart.
# Override with: helm install gp2f ./helm/gp2f -f my-values.yaml

# ── server ────────────────────────────────────────────────────────────────────
server:
  replicaCount: 3

  image:
    repository: gp2f/server
    pullPolicy: IfNotPresent
    tag: "1.0.0"

  service:
    type: ClusterIP
    port: 3000

  ingress:
    enabled: false
    className: nginx
    annotations: {}
    hosts:
      - host: gp2f.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"

  env:
    RUST_LOG: "info"
    LOG_FORMAT: "json"
    # Set via a Secret in production:
    # OPENAI_API_KEY, ANTHROPIC_API_KEY, GROQ_API_KEY
    # TEMPORAL_ENDPOINT, TEMPORAL_NAMESPACE

  envFrom: []
  # - secretRef:
  #     name: gp2f-secrets

  # Horizontal Pod Autoscaler
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  podDisruptionBudget:
    enabled: true
    minAvailable: 2

  livenessProbe:
    httpGet:
      path: /livez
      port: 3000
    initialDelaySeconds: 10
    periodSeconds: 15

  readinessProbe:
    httpGet:
      path: /health
      port: 3000
    initialDelaySeconds: 5
    periodSeconds: 10

  affinity: {}
  tolerations: []
  nodeSelector: {}

# ── worker (Temporal activity worker) ────────────────────────────────────────
worker:
  enabled: true
  replicaCount: 2

  image:
    repository: gp2f/worker
    pullPolicy: IfNotPresent
    tag: "1.0.0"

  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"

  env:
    RUST_LOG: "info"
    LOG_FORMAT: "json"
    TEMPORAL_NAMESPACE: "gp2f-prod"

  envFrom: []

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# ── feature flags (canary rollout) ────────────────────────────────────────────
canary:
  # Global AI feature flag (per-tenant overrides are set via the API).
  aiEnabled: true
  # Failure-rate threshold for automatic rollback (percentage, e.g. 0.1 = 0.1 %).
  rollbackThresholdPercent: 0.1
  # Rolling window for failure-rate calculation (seconds).
  windowSeconds: 300

# ── secrets (set in production via external-secrets or vault-agent) ──────────
secrets:
  create: false
  name: gp2f-secrets
  data: {}
  # openaiApiKey: ""
  # anthropicApiKey: ""
  # groqApiKey: ""
  # temporalEndpoint: ""

# ── Temporal persistence (Phase 4.1 – isolated Postgres for Temporal history) ─
# Deploy a dedicated Postgres instance for Temporal so that workflow history
# writes never contend with application business-data tables.
# Set temporal.postgres.external = true when using an external managed DB
# (e.g. RDS, Cloud SQL) and supply the connection string via a Secret.
temporal:
  postgres:
    # Set to true to use an in-cluster Postgres StatefulSet for Temporal.
    # Set to false when providing an external managed Postgres endpoint.
    enabled: true
    image: postgres:16
    storageSize: 50Gi
    storageClass: ""
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2000m"
        memory: "4Gi"
    # Phase 4.2 – Postgres autovacuum and WAL tuning for high-write-throughput
    # Temporal event-sourcing workloads.  These parameters are injected via
    # postgresql.conf overrides in the StatefulSet init container.
    config:
      # WAL settings – sustain high-throughput event appends without stalling.
      max_wal_size: "4GB"
      min_wal_size: "1GB"
      wal_compression: "on"
      wal_level: "replica"
      checkpoint_completion_target: "0.9"
      # Autovacuum – keep the Temporal history tables lean under constant inserts.
      autovacuum_vacuum_cost_delay: "2ms"
      autovacuum_vacuum_scale_factor: "0.01"
      autovacuum_analyze_scale_factor: "0.005"
      autovacuum_max_workers: "6"
      # Shared buffers – Temporal reads recent history frequently; cache it.
      shared_buffers: "1GB"
      effective_cache_size: "3GB"
      work_mem: "16MB"
      maintenance_work_mem: "256MB"

# ── service account ───────────────────────────────────────────────────────────
serviceAccount:
  create: true
  annotations: {}
  name: ""
