name: Publish Node Native Extension

on:
  push:
    tags:
      - 'v*' # Triggers when you push a tag like v0.1.0

env:
  DEBUG: napi:*
  APP_NAME: gp2f-node

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            build: |
              npm run build
              strip -x *.node
          - host: macos-latest
            target: aarch64-apple-darwin
            build: |
              npm run build --target aarch64-apple-darwin
              strip -x *.node
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: |
              npm run build --target x86_64-unknown-linux-gnu
              strip *.node

    name: stable - ${{ matrix.settings.target }} - node@18
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}
      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.settings.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Install dependencies
        working-directory: ./gp2f-node
        run: npm install

      - name: Build
        working-directory: ./gp2f-node
        run: ${{ matrix.settings.build }}
        env:
          APP_NAME: ${{ env.APP_NAME }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: gp2f-node/${{ env.APP_NAME }}.*.node
          if-no-files-found: error

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install dependencies
        working-directory: ./gp2f-node
        run: npm install

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: gp2f-node/artifacts

      - name: Move artifacts
        working-directory: ./gp2f-node
        run: npm run artifacts

      - name: Publish to NPM
        working-directory: ./gp2f-node
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
