name: CI

on:
  push:
    branches: [main, "copilot/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: cargo check + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo check
        run: cargo check --workspace

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: cargo fmt check
        run: cargo fmt --all -- --check

  workflow-lint:
    name: workflow determinism lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reject non-deterministic code in workflow definitions
        # Workflow definitions must be fully deterministic.  Any use of
        # wall-clock time (std::time / chrono::Utc::now) or random-number
        # generation (rand::) inside workflow source files is a hard failure.
        run: |
          set -euo pipefail
          WORKFLOW_FILES=$(find server/src -name "workflow*.rs" -o -name "pilot_workflows.rs")
          echo "Linting workflow files: $WORKFLOW_FILES"
          FAILED=0
          for f in $WORKFLOW_FILES; do
            if grep -En "(std::time|SystemTime|Instant::now|chrono::Utc::now|rand::|thread_rng|random\(\))" "$f"; then
              echo "ERROR: Non-deterministic code detected in $f"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "Workflow linting FAILED – remove non-deterministic calls from workflow definitions."
            exit 1
          fi
          echo "Workflow linting passed."

  test:
    name: cargo test (${{ matrix.os }})
    # Run the determinism oracle on all three major platforms to verify
    # bit-for-bit parity (Phase 2 – Determinism Hardening).
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: cargo test (all crates)
        run: cargo test --workspace

  wasm-build:
    name: WASM build + wasm-opt + size check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-wasm-

      - name: Install wasm-opt (binaryen)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y binaryen

      - name: Build policy-core as WASM (release, std feature enabled)
        run: |
          cargo build -p policy-core \
            --target wasm32-unknown-unknown \
            --release

      - name: Run wasm-opt on policy-core WASM binary
        run: |
          WASM_FILE=$(find target/wasm32-unknown-unknown/release -name "policy_core.wasm" | head -1)
          if [ -n "$WASM_FILE" ]; then
            echo "Optimising $WASM_FILE with wasm-opt -O3"
            wasm-opt -O3 -o "${WASM_FILE%.wasm}_opt.wasm" "$WASM_FILE"
            WASM_OPT_FILE="${WASM_FILE%.wasm}_opt.wasm"
          else
            echo "::warning::policy_core.wasm not found; skipping wasm-opt"
            exit 0
          fi

          # ── WASM size check ────────────────────────────────────────────────
          # Fail the build if the optimised WASM binary exceeds the budget.
          WASM_SIZE_BYTES=$(wc -c < "$WASM_OPT_FILE")
          WASM_SIZE_KB=$(( WASM_SIZE_BYTES / 1024 ))
          echo "policy_core_opt.wasm size: ${WASM_SIZE_KB} KiB (${WASM_SIZE_BYTES} bytes)"

          MAX_SIZE_KB=512
          if [ "$WASM_SIZE_KB" -gt "$MAX_SIZE_KB" ]; then
            echo "::error::WASM binary exceeds size budget: ${WASM_SIZE_KB} KiB > ${MAX_SIZE_KB} KiB"
            exit 1
          fi
          echo "::notice::WASM size OK: ${WASM_SIZE_KB} KiB (budget: ${MAX_SIZE_KB} KiB)"

