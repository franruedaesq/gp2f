name: CI

on:
  push:
    branches: [main, "copilot/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: cargo check + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo check
        run: cargo check --workspace

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: cargo fmt check
        run: cargo fmt --all -- --check

  workflow-lint:
    name: workflow determinism lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reject non-deterministic code in workflow definitions
        # Workflow definitions must be fully deterministic.  Any use of
        # wall-clock time (std::time / chrono::Utc::now) or random-number
        # generation (rand::) inside workflow source files is a hard failure.
        run: |
          set -euo pipefail
          WORKFLOW_FILES=$(find server/src -name "workflow*.rs" -o -name "pilot_workflows.rs")
          echo "Linting workflow files: $WORKFLOW_FILES"
          FAILED=0
          for f in $WORKFLOW_FILES; do
            if grep -En "(std::time|SystemTime|Instant::now|chrono::Utc::now|rand::|thread_rng|random\(\))" "$f"; then
              echo "ERROR: Non-deterministic code detected in $f"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "Workflow linting FAILED – remove non-deterministic calls from workflow definitions."
            exit 1
          fi
          echo "Workflow linting passed."

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: cargo test (all crates)
        run: cargo test --workspace
